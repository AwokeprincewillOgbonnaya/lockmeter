<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockmeter – Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            text-align: center;
        }

        /* ── Logo ── */
        .logo-wrap {
            margin-bottom: 16px;
        }

        .logo-wrap img {
            width: 90px;
            height: auto;
        }

        /* ── Headings ── */
        .welcome {
            font-size: 19px;
            font-weight: 400;
            color: #111;
            margin-bottom: 2px;
        }

        .sub {
            font-size: 18px;
            font-weight: 700;
            color: #111;
            margin-bottom: 22px;
        }

        /* ── Form ── */
        .form-group {
            text-align: left;
            margin-bottom: 13px;
        }

        label {
            display: block;
            font-size: 13.5px;
            font-weight: 500;
            color: #222;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #ccd4e8;
            border-radius: 6px;
            font-size: 14px;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }

        input:focus { border-color: #1a6dff; }

        /* ── Red note ── */
        .note {
            font-size: 11.5px;
            color: #e00;
            text-align: left;
            margin-bottom: 14px;
            margin-top: -4px;
        }

        /* ── API Error ── */
        .error-msg {
            display: none;
            background: #fff0f0;
            border: 1px solid #ffb3b3;
            color: #cc0000;
            font-size: 12.5px;
            border-radius: 7px;
            padding: 9px 12px;
            margin-bottom: 12px;
            text-align: left;
        }
        .error-msg.show { display: block; }

        /* ── Success ── */
        .success-msg {
            display: none;
            background: #f0fff4;
            border: 1px solid #b3ffcc;
            color: #007733;
            font-size: 12.5px;
            border-radius: 7px;
            padding: 9px 12px;
            margin-bottom: 12px;
            text-align: left;
        }
        .success-msg.show { display: block; }

        /* ── Button ── */
        .btn-signup {
            width: 100%;
            padding: 11px;
            background: #1a6dff;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-signup:hover { background: #1558d6; }
        .btn-signup:active { transform: scale(0.98); }
        .btn-signup:disabled { background: #a0b8f0; cursor: not-allowed; }

        /* ── Footer ── */
        .footer-link {
            margin-top: 18px;
            font-size: 13px;
            color: #444;
        }

        .footer-link a {
            color: #1a6dff;
            font-weight: 700;
            text-decoration: none;
        }

        .footer-link a:hover { text-decoration: underline; }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">

    <!-- 
        LOGO: 
        Place your logo image at:
        src/main/resources/static/images/logo.jpg
        It will automatically appear here!
    -->
    <div class="logo-wrap">
        <img src="/images/logo.png" alt="Lockmeter Logo" />
    </div>

    <!-- Headings -->
    <p class="welcome">Welcome !</p>
    <p class="sub">Sign up for an Account</p>

    <!-- API Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Success -->
    <div class="success-msg" id="successMsg"></div>

    <!-- Username -->
    <div class="form-group">
        <label for="userName">Username</label>
        <input type="text" id="userName" placeholder="Enter your username" />
    </div>

    <!-- Email -->
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <!-- Password -->
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
        <label for="confirmPassword">Confirm your Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" />
    </div>

    <!-- Red note -->
    <p class="note">NOTE: Forgotten password cannot be recovered</p>

    <!-- Sign Up button -->
    <button class="btn-signup" id="signupBtn" onclick="handleRegister()">
        SIGN UP
    </button>

    <!-- Footer -->
    <p class="footer-link">
        Already have an account? <a href="login.html">LOGIN</a>
    </p>

</div>

<script>
    const API_BASE = 'http://localhost:8090';

    async function handleRegister() {
        const userName        = document.getElementById('userName').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();
        const errorMsg        = document.getElementById('errorMsg');
        const successMsg      = document.getElementById('successMsg');
        const signupBtn       = document.getElementById('signupBtn');

        // Clear messages
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
        errorMsg.textContent   = '';
        successMsg.textContent = '';

        // Validate
        if (!userName) { showError('Username is required.'); return; }
        if (!email)    { showError('Email is required.'); return; }
        if (!password) { showError('Password is required.'); return; }
        if (password.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
        }
        if (!confirmPassword) {
            showError('Please confirm your password.');
            return;
        }
        if (password !== confirmPassword) {
            showError('Passwords do not match.');
            return;
        }

        // Loading state
        signupBtn.disabled = true;
        signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';

        try {
            const response = await fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userName, email, password, confirmPassword })
            });

            const result = await response.json();

            if (response.ok && result.statusCode === 200) {
                successMsg.textContent = 'Account created successfully...';
                successMsg.classList.add('show');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } else {
                showError(result.message || 'Registration failed. Please try again.');
            }

        } catch (err) {
            showError('Cannot connect to server. Please try again.');
        } finally {
            signupBtn.disabled = false;
            signupBtn.innerHTML = 'SIGN UP';
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
    }

    // Enter key triggers signup
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleRegister();
    });
</script>

</body>
</html>
